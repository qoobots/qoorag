server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/qoorag
    username: postgres
    password: "123456"
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
  data:
    redis:
      host: localhost
      port: 6379
      # password: 123456  # redis.windows-service.conf 中已设置，当前 redis-server 运行实例未启用 requirepass
      # Redis 5.x 不支持 ACL 用户名，无需配置 username
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

qoorag:
  security:
    # 默认管理员初始密码（首次启动由 SeedService 写入，BCrypt 加密）
    default-admin-password: "123456"
    # 知识库软删除保留期（天），过期后定时任务物理清理业务数据
    kb-retention-days: 30
