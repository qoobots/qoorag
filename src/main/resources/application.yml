server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/qoorag
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

qoorag:
  security:
    # 默认管理员初始密码（首次启动由 SeedService 写入，BCrypt 加密）
    default-admin-password: ${ADMIN_DEFAULT_PASSWORD:}
    # 知识库软删除保留期（天），过期后定时任务物理清理业务数据
    kb-retention-days: 30
  # 阿里云百炼大模型（OpenAI 兼容模式）
  bailian:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${ALI-API-KEY:}
    embedding-model: text-embedding-v2
    chat-model: qwen-plus
    embedding-batch-size: 25
