server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/qoorag
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          lob:
            non_contextual_creation: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  # 监控与健康检查（P2-11）
  jmx:
    enabled: false
  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics,prometheus
    endpoint:
      health:
        show-details: when-authorized
    metrics:
      tags:
        application: qoorag

qoorag:
  security:
    # 默认管理员初始密码（首次启动由 SeedService 写入，BCrypt 加密）
    default-admin-password: ${ADMIN_DEFAULT_PASSWORD:}
    # 知识库软删除保留期（天），过期后定时任务物理清理业务数据
    kb-retention-days: 30
    # 会话令牌 TTL（分钟），过期后需重新登录；每次请求自动续期
    session-ttl-minutes: 120
    # 审计日志留存期（天），超过则定时物理清理；默认 180 天（6 个月，#18）
    audit-retention-days: 180
  # 内容安全（#18）：默认关闭；开启需配置阿里云密钥。关闭或异常时 fail-open 放行。
  content-safety:
    enabled: false
    aliyun:
      access-key: ${CONTENT_SAFETY_ALIYUN_AK:}
      secret-key: ${CONTENT_SAFETY_ALIYUN_SK:}
      region: cn-shanghai
      endpoint: https://green.cn-shanghai.aliyuncs.com
  # 阿里云百炼大模型（OpenAI 兼容模式）
  bailian:
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: ${ALI-API-KEY:}
    embedding-model: text-embedding-v2
    chat-model: qwen-plus
    embedding-batch-size: 25
