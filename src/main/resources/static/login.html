<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - qoorag</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
<div class="login-card">
    <div class="login-brand">
        <span class="logo">Q</span>
        <div>
            <div class="b-name">qoorag</div>
            <div class="b-sub">企业级 RAG 知识库平台</div>
        </div>
    </div>
    <h2>欢迎回来</h2>
    <p class="sub">登录以管理你的知识库</p>
    <label>用户名</label>
    <input id="username" value="admin" autocomplete="username">
    <label>密码</label>
    <input id="password" type="password" value="123456" autocomplete="current-password">
    <button class="btn-block" onclick="doLogin()">登录</button>
    <p class="muted login-foot">默认账号 admin / 123456（首次启动由 SeedService 写入）</p>
</div>
<script src="/js/api.js"></script>
<script>
async function doLogin() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const r = await api('POST', '/api/auth/login', { username, password });
    if (r.code === 0) {
        localStorage.setItem('qoorag_token', r.data.token);
        location.href = '/index.html';
    } else {
        alert('登录失败：' + r.message);
    }
}
</script>
</body>
</html>
