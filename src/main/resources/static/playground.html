<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>问答 / 检索 - qoorag</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <div class="card pg-form">
        <h2>问答 / 检索 Playground</h2>
        <label>选择知识库</label>
        <select id="kbSel"></select>
        <label>API Key（在「知识库管理」为该库签发并复制明文 Key）</label>
        <input id="apiKey" type="password" placeholder="qk_...">
        <div style="margin:12px 0">
            <label>模式</label>
            <label style="display:inline;margin-right:16px"><input type="radio" name="mode" value="chat" checked style="width:auto"> 问答（检索+LLM 生成）</label>
            <label style="display:inline"><input type="radio" name="mode" value="retrieve" style="width:auto"> 仅检索（返回召回片段）</label>
        </div>
        <label>问题 / 查询</label>
        <textarea id="query" rows="3" placeholder="例如：公司的请假流程是什么？"></textarea>
        <div style="margin-top:12px"><button onclick="send()">发送</button></div>
        <p class="muted">说明：问答/检索走对外 API（/api/v1），使用 API Key 鉴权，与登录会话令牌不同。</p>
    </div>
    <div class="card">
        <h2>结果</h2>
        <div id="result"><div class="empty"><div class="ico">💬</div>在上方输入问题并发送，结果将显示在这里</div></div>
    </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script>
requireToken();
function esc(s) {
    return (s == null ? '' : String(s)).replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
async function loadKbs() {
    const r = await api('GET', '/api/kb');
    const sel = document.getElementById('kbSel');
    sel.innerHTML = '';
    (r.data || []).forEach(kb => {
        sel.innerHTML += `<option value="${kb.id}">${esc(kb.name)} (ID:${kb.id})</option>`;
    });
}
async function send() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const query = document.getElementById('query').value.trim();
    if (!apiKey) { alert('请填写 API Key（在「知识库管理」为该知识库签发并复制）'); return; }
    if (!query) { alert('请输入问题'); return; }
    const mode = document.querySelector('input[name=mode]:checked').value;
    const path = mode === 'chat' ? '/api/v1/chat' : '/api/v1/retrieve';
    const out = document.getElementById('result');
    out.innerHTML = '<div class="bubble assistant loading-dots"><div class="who">qoorag 助手</div><div>思考中</div></div>';
    try {
        const r = await api('POST', path, { query, topK: 5 }, apiKey, true);
        if (r.code !== 0) {
            out.innerHTML = '<div class="bubble assistant"><div class="who">qoorag 助手</div>' +
                '<div style="color:#dc2626">调用失败：' + esc(r.message) + '</div></div>';
            return;
        }
        render(r.data, mode, query);
    } catch (e) {
        out.innerHTML = '<div class="bubble assistant"><div class="who">qoorag 助手</div>' +
            '<div style="color:#dc2626">异常：' + esc(e.message) + '</div></div>';
    }
}
function render(data, mode, query) {
    const out = document.getElementById('result');
    let html = '<div class="bubble user"><div class="who">你</div><div class="ans">' + esc(query) + '</div></div>';
    html += '<div class="bubble assistant"><div class="who">qoorag 助手</div>';
    if (mode === 'chat') {
        html += '<div class="ans">' + esc(data.answer) + '</div>';
        if (data.sources && data.sources.length) {
            html += '<div class="sources"><div class="s-title">参考片段（' + data.sources.length + '）</div>';
            data.sources.forEach(s => html += `<div class="source-item"><span class="s-score">相似度 ${Number(s.score).toFixed(3)}</span>${esc(s.content)}</div>`);
            html += '</div>';
        } else {
            html += '<div class="sources"><div class="s-title">无召回片段</div></div>';
        }
    } else {
        const chunks = data.chunks || [];
        html += '<div class="sources"><div class="s-title">命中 ' + chunks.length + ' 条（topK=' + (data.topK || 5) + '）</div>';
        chunks.forEach(s => html += `<div class="source-item"><span class="s-score">相似度 ${Number(s.score).toFixed(3)}</span>${esc(s.content)}</div>`);
        html += '</div>';
    }
    html += '</div>';
    out.innerHTML = html;
}
loadKbs();
</script>
</body>
</html>
