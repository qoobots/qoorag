<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>系统管理 - qoorag</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
    <span class="brand">qoorag 控制台</span>
    <nav>
        <a href="/index.html">首页</a>
        <a href="/system-admin.html">系统管理</a>
        <a href="/rag-admin.html">知识库管理</a>
        <a href="/documents.html">文档管理</a>
        <a href="/playground.html">问答</a>
        <a href="/audit.html">审计</a>
        <a href="javascript:logout()">退出</a>
    </nav>
</header>
<div class="container">
    <div class="card">
        <h2>用户管理</h2>
        <label>用户名</label><input id="u_username">
        <label>密码</label><input id="u_password" type="password">
        <label>显示名</label><input id="u_displayName">
        <label>角色（逗号分隔角色ID）</label><input id="u_roleIds" placeholder="1,2">
        <div style="margin-top:12px"><button onclick="addUser()">新增用户</button></div>
        <table id="userTable">
            <thead><tr><th>ID</th><th>用户名</th><th>显示名</th><th>状态</th><th>角色</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <div class="card">
        <h2>角色</h2>
        <label>角色名</label><input id="r_name">
        <label>描述</label><input id="r_desc">
        <div style="margin-top:12px"><button onclick="addRole()">新增角色</button></div>
        <table id="roleTable">
            <thead><tr><th>ID</th><th>名称</th><th>描述</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
    <div class="card">
        <h2>资源池配置</h2>
        <p class="hint">LLM / Embedding / 向量库配置。修改后需<strong>重启应用</strong>生效（仅启动期加载）。
           敏感项（如 API Key）已脱敏，留空或不修改则保持原值。</p>
        <div id="rpContainer"></div>
        <div style="margin-top:12px"><button onclick="saveResourcePool()">保存资源池配置</button></div>
    </div>
</div>
<script src="/js/api.js"></script>
<script>
requireToken();
async function loadUsers() {
    const r = await api('GET', '/api/admin/users');
    const tb = document.querySelector('#userTable tbody');
    tb.innerHTML = '';
    (r.data || []).forEach(u => {
        const roles = (u.roles || []).map(x => x.name).join(',');
        tb.innerHTML += `<tr><td>${u.id}</td><td>${u.username}</td><td>${u.displayName||''}</td><td>${u.status}</td><td>${roles}</td></tr>`;
    });
}
async function loadRoles() {
    const r = await api('GET', '/api/admin/roles');
    const tb = document.querySelector('#roleTable tbody');
    tb.innerHTML = '';
    (r.data || []).forEach(role => {
        tb.innerHTML += `<tr><td>${role.id}</td><td>${role.name}</td><td>${role.description||''}</td></tr>`;
    });
}
async function addUser() {
    const roleIds = document.getElementById('u_roleIds').value.split(',').map(s => s.trim()).filter(Boolean).map(Number);
    await api('POST', '/api/admin/users', {
        username: document.getElementById('u_username').value,
        password: document.getElementById('u_password').value,
        displayName: document.getElementById('u_displayName').value,
        roleIds
    });
    loadUsers();
}
async function addRole() {
    await api('POST', '/api/admin/roles', {
        name: document.getElementById('r_name').value,
        description: document.getElementById('r_desc').value
    });
    loadRoles();
}
function logout() {
    api('POST', '/api/auth/logout').finally(() => {
        localStorage.removeItem('qoorag_token');
        location.href = '/login.html';
    });
}
loadUsers(); loadRoles(); loadResourcePool();

let rpData = {};
function esc(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;')
            .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
// 资源池字段预设：下拉选项 + 推荐小字提示
const RP_PRESETS = {
    embedding_model: {
        select: ['text-embedding-v3', 'text-embedding-v4', 'text-embedding-v2', 'text-embedding-v1', 'text-embedding-async-v2'],
        hint: '百炼文本向量模型，需与向量库维度一致；默认推荐 text-embedding-v3（1024维）。'
    },
    embedding_batch_size: {
        hint: '单次向量化批大小，推荐 10~25；值越大吞吐越高但内存占用更大。'
    },
    chat_model: {
        select: ['qwen-plus', 'qwen-max', 'qwen-turbo', 'qwen-long', 'deepseek-v3', 'deepseek-r1'],
        hint: '百炼/兼容 OpenAI 协议的对话模型；默认推荐 qwen-plus。'
    }
};

async function loadResourcePool() {
    const r = await api('GET', '/api/admin/resource-pool');
    rpData = r.data || {};
    const container = document.getElementById('rpContainer');
    container.innerHTML = '';
    Object.keys(rpData).forEach(category => {
        const section = document.createElement('div');
        section.innerHTML = '<h3>' + esc(category) + '</h3>';
        (rpData[category] || []).forEach(item => {
            const wrap = document.createElement('div');
            wrap.className = 'rp-item';
            wrap.innerHTML = buildRpControl(category, item);
            section.appendChild(wrap);
        });
        container.appendChild(section);
    });
    // 下拉选择“自定义…”时切换为文本框
    container.querySelectorAll('select[id^="rp_"]').forEach(sel => {
        sel.addEventListener('change', function () {
            if (this.value === '__custom__') {
                const input = document.createElement('input');
                input.id = this.id;
                input.type = 'text';
                input.placeholder = '输入自定义值';
                this.replaceWith(input);
                input.focus();
            }
        });
    });
}

function buildRpControl(category, item) {
    const preset = RP_PRESETS[item.configKey];
    const inputType = item.masked ? 'password' : 'text';
    const hintHtml = (preset && preset.hint)
        ? '<small class="hint-inline">' + esc(preset.hint) + '</small>' : '';
    let controlHtml;
    if (preset && preset.select) {
        const opts = preset.select.slice();
        if (item.configValue && !opts.includes(item.configValue)) opts.push(item.configValue);
        opts.push('__custom__');
        const optHtml = opts.map(o => {
            if (o === '__custom__') return '<option value="__custom__">✎ 自定义…</option>';
            const sel = (o === item.configValue) ? ' selected' : '';
            return '<option value="' + esc(o) + '"' + sel + '>' + esc(o) + '</option>';
        }).join('');
        controlHtml = '<select id="rp_' + esc(category) + '_' + esc(item.configKey) + '">' + optHtml + '</select>';
    } else {
        controlHtml = '<input id="rp_' + esc(category) + '_' + esc(item.configKey) + '" type="' + inputType
            + '" value="' + esc(item.configValue) + '">';
    }
    return '<label title="' + esc(item.configKey) + '">' + esc(item.description || item.configKey) + '</label>'
        + controlHtml + hintHtml;
}
async function saveResourcePool() {
    for (const category of Object.keys(rpData)) {
        for (const item of (rpData[category] || [])) {
            const el = document.getElementById('rp_' + category + '_' + item.configKey);
            if (!el) continue;
            await api('PUT', '/api/admin/resource-pool', {
                category: category,
                configKey: item.configKey,
                configValue: el.value,
                description: item.description
            });
        }
    }
    alert('保存成功，重启应用后配置生效');
    loadResourcePool();
}
</script>
</body>
</html>
