<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>qoorag 控制台</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="container">
    <div class="card">
        <h2>欢迎使用 qoorag</h2>
        <p id="me" class="muted">加载中…</p>
        <p>qoorag 企业级 RAG 知识库平台。通过左侧导航进入知识库管理、文档入库与问答测试。</p>
    </div>
    <div class="card">
        <h2>快捷入口</h2>
        <div class="quick-grid">
            <a class="quick-card" href="/rag-admin.html">
                <div class="qc-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></svg></div>
                <div class="qc-title">知识库管理</div>
                <div class="qc-desc">创建知识库、配置权限与签发 API Key</div>
            </a>
            <a class="quick-card" href="/documents.html">
                <div class="qc-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></div>
                <div class="qc-title">文档管理</div>
                <div class="qc-desc">上传文档并入库，查看处理状态</div>
            </a>
            <a class="quick-card" href="/playground.html">
                <div class="qc-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
                <div class="qc-title">问答测试</div>
                <div class="qc-desc">基于知识库检索并生成回答</div>
            </a>
            <a class="quick-card" href="/audit.html">
                <div class="qc-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div>
                <div class="qc-title">审计日志</div>
                <div class="qc-desc">查询与导出操作审计记录</div>
            </a>
        </div>
    </div>
</div>
<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script>
requireToken();
async function load() {
    const r = await api('GET', '/api/auth/me');
    if (r.code === 0) {
        document.getElementById('me').textContent =
            '当前用户ID: ' + r.data.userId + ' | 租户: ' + r.data.tenantId + ' | 角色: ' + r.data.roles.join(', ');
    }
}
function logout() {
    api('POST', '/api/auth/logout').finally(() => {
        localStorage.removeItem('qoorag_token');
        location.href = '/login.html';
    });
}
load();
</script>
</body>
</html>
