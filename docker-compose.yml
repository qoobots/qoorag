version: "3.9"

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: qoorag-postgres
    environment:
      POSTGRES_DB: qoorag
      POSTGRES_USER: qoorag
      POSTGRES_PASSWORD: qoorag
    ports:
      - "5432:5432"
    volumes:
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qoorag"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
